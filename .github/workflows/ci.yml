name: CI

on:
  push:
    branches: [main]
    paths: ["agent-eval/**"]
  pull_request:
    paths: ["agent-eval/**"]

defaults:
  run:
    working-directory: agent-eval

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=agent_eval --cov-report=term-missing -v

      - name: Lint with ruff
        run: ruff check agent_eval/ tests/

      - name: Type check with mypy
        run: mypy agent_eval/

      - name: Dry-run smoke test
        run: agent-eval run scenarios/ --dry-run
